name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Checkout shared (@core/common)
        uses: actions/checkout@v4
        with:
          repository: fwmakc/shared
          path: shared-src

      - name: Build @core/common tarball
        run: |
          cd shared-src
          npm install
          npm run build
          npm pack
          cd ..
          mkdir -p ../shared
          cp shared-src/core-common-1.0.0.tgz ../shared/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Create test databases
        run: |
          PGPASSWORD=1234 psql -h localhost -U root -d postgres -c "CREATE DATABASE api_server_test;"
          PGPASSWORD=1234 psql -h localhost -U root -d postgres -c "CREATE DATABASE api_server_http_test;"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
